<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Orders</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; padding: 2rem; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        h1 { color: #2563eb; margin-bottom: 0.5rem; }
        .sub { color: #6b7280; margin-bottom: 1.5rem; }
        .back-link { display: inline-block; margin-top: 1.5rem; color: #2563eb; text-decoration: none; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }

        #message { margin: 1rem 0; padding: 0.75rem; border-radius: 8px; display: none; }
        #message.success { display: block; background: #d1fae5; color: #065f46; }
        #message.error { display: block; background: #fee2e2; color: #991b1b; }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; }
        th { background: #eef2ff; text-align: left; padding: 0.75rem; font-weight: 600; }
        td { padding: 0.75rem; border-bottom: 1px solid #e5e7eb; vertical-align: middle; }
        tr:hover { background: #f9fafb; }

        .status-select { padding: 0.3rem 0.5rem; border-radius: 6px; border: 1px solid #d1d5db; background: white; }
        .btn-action { padding: 0.3rem 0.8rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: 0.2s; margin: 2px; }
        .btn-update { background: #2563eb; color: white; }
        .btn-update:hover { background: #1e40af; }
        .btn-print { background: #f59e0b; color: white; }
        .btn-print:hover { background: #d97706; }
        .btn-delete { background: #ef4444; color: white; }
        .btn-delete:hover { background: #dc2626; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .loading { text-align: center; padding: 2rem; color: #6b7280; }
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-received { background: #fef3c7; color: #92400e; }
        .badge-printing { background: #bfdbfe; color: #1e40af; }
        .badge-completed { background: #d1fae5; color: #065f46; }
        .badge-picked { background: #e5e7eb; color: #374151; }

        @media (max-width: 768px) {
            table { font-size: 0.75rem; }
            th, td { padding: 0.4rem; }
        }

        /* Print receipt styles */
        @media print {
            .no-print { display: none !important; }
            .print-receipt { display: block !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; padding: 1rem; }
            table { font-size: 0.8rem; }
            th, td { border: 1px solid #ccc; }
            .btn-action, .status-select, .back-link, #message { display: none !important; }
        }
        .print-receipt { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 All Orders</h1>
        <p class="sub">View, update, print, or delete orders</p>

        <div id="message"></div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>User</th>
                        <th>Student</th>
                        <th>Pages</th>
                        <th>Copies</th>
                        <th>Type</th>
                        <th>Binding</th>
                        <th>Files</th>
                        <th>Status</th>
                        <th class="no-print">Actions</th>
                    </tr>
                </thead>
                <tbody id="orders-body">
                    <tr><td colspan="10" class="loading">Loading orders...</td></tr>
                </tbody>
            </table>
        </div>

        <a href="dashboard.html" class="back-link no-print">← Back to Dashboard</a>
    </div>

    <script>
        const BACKEND_URL = 'https://campus-print-2-0.onrender.com'; // <-- update if different

        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '../index.html';
        }

        const messageDiv = document.getElementById('message');

        function showMessage(text, type = 'success') {
            messageDiv.textContent = text;
            messageDiv.className = type;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 4000);
        }

        async function fetchOrders() {
            const tbody = document.getElementById('orders-body');
            tbody.innerHTML = '<tr><td colspan="10" class="loading">Loading orders...</td></tr>';

            try {
                const res = await fetch(`${BACKEND_URL}/api/admin/orders`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 403) {
                    showMessage('Admin access required. Redirecting...', 'error');
                    setTimeout(() => window.location.href = '../main.html', 1500);
                    return;
                }
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Failed to fetch orders');
                }

                const data = await res.json();
                renderOrders(data.orders);
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="10" style="color: red;">Error: ${err.message}</td></tr>`;
            }
        }

        function renderOrders(orders) {
            const tbody = document.getElementById('orders-body');
            if (!orders || orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10">No orders found.</td></tr>';
                return;
            }

            let html = '';
            orders.forEach(order => {
                let badgeClass = 'badge-received';
                if (order.status === 'printing') badgeClass = 'badge-printing';
                else if (order.status === 'completed') badgeClass = 'badge-completed';
                else if (order.status === 'picked') badgeClass = 'badge-picked';

                let fileLinks = 'No files';
                if (order.file_urls && order.file_urls.length > 0) {
                    fileLinks = order.file_urls.map(f => `<a href="${BACKEND_URL}${f}" target="_blank">${f.split('/').pop()}</a>`).join(', ');
                }

                html += `
                    <tr>
                        <td><code>${order.id.substring(0, 8)}</code></td>
                        <td>${order.username}</td>
                        <td>${order.student_name}</td>
                        <td>${order.total_pages}</td>
                        <td>${order.copies}</td>
                        <td>${order.print_type}</td>
                        <td>${order.binding}</td>
                        <td>${fileLinks}</td>
                        <td>
                            <select class="status-select" data-order-id="${order.id}">
                                <option value="received" ${order.status === 'received' ? 'selected' : ''}>Received</option>
                                <option value="printing" ${order.status === 'printing' ? 'selected' : ''}>Printing</option>
                                <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>Completed</option>
                                <option value="picked" ${order.status === 'picked' ? 'selected' : ''}>Picked</option>
                            </select>
                            <span class="badge ${badgeClass}">${order.status}</span>
                        </td>
                        <td class="no-print">
                            <button class="btn-action btn-print" data-order='${JSON.stringify(order)}'>🖨️ Print</button>
                            <button class="btn-action btn-update" data-order-id="${order.id}">Update</button>
                            <button class="btn-action btn-delete" data-order-id="${order.id}">🗑️ Delete</button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;

            // Attach event listeners
            document.querySelectorAll('.btn-update').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const orderId = btn.dataset.orderId;
                    const select = document.querySelector(`.status-select[data-order-id="${orderId}"]`);
                    const newStatus = select.value;
                    await updateOrderStatus(orderId, newStatus, btn);
                });
            });

            document.querySelectorAll('.btn-print').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const order = JSON.parse(btn.dataset.order);
                    printOrder(order);
                });
            });

            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const orderId = btn.dataset.orderId;
                    if (confirm(`Are you sure you want to delete order ${orderId.substring(0,8)}?`)) {
                        await deleteOrder(orderId, btn);
                    }
                });
            });
        }

        async function updateOrderStatus(orderId, status, button) {
            const originalText = button.textContent;
            button.textContent = 'Updating...';
            button.disabled = true;

            try {
                const res = await fetch(`${BACKEND_URL}/api/admin/orders/${orderId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status })
                });

                if (res.ok) {
                    showMessage(`✅ Order ${orderId.substring(0,8)} status updated to ${status}`, 'success');
                    await fetchOrders();
                } else {
                    const err = await res.json();
                    showMessage(`❌ Error: ${err.detail || 'Failed to update'}`, 'error');
                }
            } catch (err) {
                showMessage(`❌ Error: ${err.message}`, 'error');
            } finally {
                button.textContent = originalText;
                button.disabled = false;
            }
        }

        async function deleteOrder(orderId, button) {
            const originalText = button.textContent;
            button.textContent = 'Deleting...';
            button.disabled = true;

            try {
                const res = await fetch(`${BACKEND_URL}/api/admin/orders/${orderId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (res.ok) {
                    showMessage(`✅ Order ${orderId.substring(0,8)} deleted successfully`, 'success');
                    await fetchOrders();
                } else {
                    const err = await res.json();
                    showMessage(`❌ Error: ${err.detail || 'Failed to delete'}`, 'error');
                }
            } catch (err) {
                showMessage(`❌ Error: ${err.message}`, 'error');
            } finally {
                button.textContent = originalText;
                button.disabled = false;
            }
        }

        function printOrder(order) {
            // Create a printable receipt
            const printWindow = window.open('', '_blank', 'width=600,height=400');
            const date = new Date(order.created_at).toLocaleString();
            const status = order.status || 'N/A';
            const fileNames = order.file_urls ? order.file_urls.map(f => f.split('/').pop()).join(', ') : 'None';

            printWindow.document.write(`
                <html>
                <head><title>Order Receipt</title>
                <style>
                    body { font-family: 'Segoe UI', sans-serif; padding: 2rem; max-width: 600px; margin: auto; }
                    h1 { color: #2563eb; border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem; }
                    .row { display: flex; justify-content: space-between; padding: 0.3rem 0; border-bottom: 1px solid #f3f4f6; }
                    .label { font-weight: 600; color: #374151; }
                    .value { color: #1f2937; }
                    .footer { margin-top: 2rem; font-size: 0.8rem; color: #6b7280; text-align: center; }
                </style>
                </head>
                <body>
                    <h1>🖨️ Order Receipt</h1>
                    <div class="row"><span class="label">Order ID:</span><span class="value">${order.id}</span></div>
                    <div class="row"><span class="label">Date:</span><span class="value">${date}</span></div>
                    <div class="row"><span class="label">User:</span><span class="value">${order.username}</span></div>
                    <div class="row"><span class="label">Student Name:</span><span class="value">${order.student_name}</span></div>
                    <div class="row"><span class="label">Year:</span><span class="value">${order.year}</span></div>
                    <div class="row"><span class="label">Branch:</span><span class="value">${order.branch}</span></div>
                    <div class="row"><span class="label">Roll Number:</span><span class="value">${order.roll_number}</span></div>
                    <div class="row"><span class="label">Total Pages:</span><span class="value">${order.total_pages}</span></div>
                    <div class="row"><span class="label">Copies:</span><span class="value">${order.copies}</span></div>
                    <div class="row"><span class="label">Print Type:</span><span class="value">${order.print_type}</span></div>
                    <div class="row"><span class="label">Binding:</span><span class="value">${order.binding}</span></div>
                    <div class="row"><span class="label">Payment:</span><span class="value">${order.payment_method}</span></div>
                    <div class="row"><span class="label">Status:</span><span class="value">${status}</span></div>
                    <div class="row"><span class="label">Files:</span><span class="value">${fileNames}</span></div>
                    ${order.order_description ? `<div class="row"><span class="label">Instructions:</span><span class="value">${order.order_description}</span></div>` : ''}
                    <div class="footer">Printed from CampusPrint Admin</div>
                    <script>
                        window.onload = function() { window.print(); window.close(); }
                    <\/script>
                </body>
                </html>
            `);
            printWindow.document.close();
        }

        document.addEventListener('DOMContentLoaded', fetchOrders);
    </script>
</body>
</html>
