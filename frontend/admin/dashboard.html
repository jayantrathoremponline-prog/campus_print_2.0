<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 600px; width: 90%; background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #2563eb; margin-bottom: 0.25rem; }
        .sub { color: #6b7280; margin-bottom: 2rem; }
        .links { display: flex; flex-direction: column; gap: 1rem; margin: 2rem 0; }
        .links a { display: block; padding: 1rem 1.5rem; background: #eff6ff; border-radius: 12px; text-decoration: none; color: #1e40af; font-weight: 600; transition: 0.2s; border-left: 4px solid #2563eb; }
        .links a:hover { background: #dbeafe; transform: translateX(4px); }
        .logout-btn { padding: 0.6rem 1.5rem; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .logout-btn:hover { background: #dc2626; }
        .user-info { background: #f9fafb; padding: 0.8rem 1.2rem; border-radius: 8px; display: inline-block; margin-bottom: 1rem; }
        .back-link { display: inline-block; margin-top: 1.5rem; color: #6b7280; text-decoration: none; font-weight: 500; }
        .back-link:hover { color: #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ Admin Dashboard</h1>
        <p class="sub">Manage your CampusPrint orders</p>
        <div class="user-info">
            👋 Welcome, <span id="admin-name">Admin</span>
        </div>
        <div class="links">
            <a href="orders.html">📋 View & Manage All Orders</a>
        </div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
        <br>
        <a href="../main.html" class="back-link">← Back to Main Page</a>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '../index.html';
        }

        const username = localStorage.getItem('campusUser') || 'Admin';
        document.getElementById('admin-name').textContent = username;

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('campusUser');
            window.location.href = '../index.html';
        });

        // Verify admin status
        async function verifyAdmin() {
            try {
                const res = await fetch('https://campus-print-2-0.onrender.com/api/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Not authenticated');
                const data = await res.json();
                if (!data.is_admin) {
                    alert('You are not an admin. Redirecting...');
                    window.location.href = '../main.html';
                }
            } catch (err) {
                console.error(err);
                window.location.href = '../index.html';
            }
        }
        verifyAdmin();
    </script>
</body>
</html>
